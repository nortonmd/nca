<template>
    <div class="pod-scope">
        <div class="pod-header">
            <h1 class="pod-title">SEs, Specialists &amp; Extended Team</h1>
            <p class="pod-subtitle">
                Engaging Feedback loop to SEs and Specialists to prioritize and reduce noise.
            </p>
        </div>

        <template lwc:if={isLoading}>
            <div class="pod-state slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading pod members"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={error}>
            <div class="pod-state slds-text-color_error slds-p-around_medium">
                Unable to load Pod Members. Check object and field access.
            </div>
        </template>

        <template lwc:if={hasPodData}>
            <div class="pod-toolbar slds-m-bottom_small">
                <lightning-button
                    variant="neutral"
                    label="Refresh"
                    title="Reload Pod Member records"
                    onclick={handleRefresh}
                ></lightning-button>
            </div>

            <template lwc:if={isEmpty}>
                <div class="pod-state slds-text-body_regular slds-p-around_medium slds-text-align_center">
                    No Pod Members yet. Create records on the Pod Members tab (set Row Type and Sort Order).
                </div>
            </template>

            <template lwc:if={showRows}>
                <template for:each={rowSections} for:item="section">
                    <div key={section.key} class={section.rowClass}>
                    <template for:each={section.cards} for:item="card">
                        <div key={card.cardKey} class="pod-card-wrap slds-col">
                            <article class={section.articleClass}>
                                <div class="pod-card__label">{card.title}</div>
                                <div class="pod-card__connector" aria-hidden="true">
                                    <span class="pod-card__dot"></span>
                                    <span class="pod-card__dot"></span>
                                    <span class="pod-card__dot"></span>
                                </div>
                                <div class={section.figureClass}>
                                    <template lwc:if={card.useImage}>
                                        <img
                                            class="pod-card__photo"
                                            src={card.imageUrl}
                                            alt={card.title}
                                        />
                                    </template>
                                    <template lwc:else>
                                        <template lwc:if={card.isFemale}>
                                            <svg
                                                class="pod-card__silhouette"
                                                viewBox="0 0 64 80"
                                                focusable="false"
                                                aria-hidden="true"
                                            >
                                                <path
                                                    fill="currentColor"
                                                    d="M32 8c-6 0-11 5-11 11 0 4 2 8 5 10-7 2-12 8-12 16v18h8V46c0-3 2-5 5-5h10c3 0 5 2 5 5v17h8V45c0-8-5-14-12-16 3-2 5-6 5-10 0-6-5-11-11-11zm0 4c4 0 7 3 7 7s-3 7-7 7-7-3-7-7 3-7 7-7z"
                                                />
                                            </svg>
                                        </template>
                                        <template lwc:else>
                                            <svg
                                                class="pod-card__silhouette"
                                                viewBox="0 0 64 80"
                                                focusable="false"
                                                aria-hidden="true"
                                            >
                                                <path
                                                    fill="currentColor"
                                                    d="M32 6c-7 0-12 5-12 12 0 5 3 9 7 11-8 2-14 9-14 18v19h9V48c0-3 2-6 5-6h10c3 0 5 3 5 6v18h9V47c0-9-6-16-14-18 4-2 7-6 7-11 0-7-5-12-12-12zm0 5c4 0 7 3 7 7s-3 7-7 7-7-3-7-7 3-7 7-7z"
                                                />
                                            </svg>
                                        </template>
                                    </template>
                                </div>
                            </article>
                        </div>
                    </template>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
