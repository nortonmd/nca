<template>
    <lightning-card title="Pod Members" icon-name="standard:people">
        <div slot="actions" class="slds-button-group" role="group">
            <lightning-button
                label="New"
                variant="brand"
                onclick={openNewModal}
            ></lightning-button>
            <lightning-button
                label="Refresh"
                variant="neutral"
                onclick={handleRefresh}
            ></lightning-button>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={loadError}>
            <div class="slds-text-color_error slds-p-around_medium">
                Could not load Pod Members. Confirm object and field access.
            </div>
        </template>

        <template lwc:if={wiredPodMembersResult.data}>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <lightning-datatable
                    key-field="Id"
                    data={records}
                    columns={columns}
                    draft-values={draftValues}
                    onsave={handleSave}
                    onrowaction={handleRowAction}
                    hide-checkbox-column
                    show-row-number-column
                ></lightning-datatable>
                <template lwc:if={savePending}>
                    <div class="slds-m-top_x-small slds-text-body_small slds-text-color_weak">
                        Saving…
                    </div>
                </template>
            </div>
        </template>
    </lightning-card>

    <template lwc:if={isNewModalOpen}>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby="pod-member-new-heading"
            class="slds-modal slds-fade-in-open"
        >
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        class="slds-modal__close"
                        icon-name="utility:close"
                        alternative-text="Close"
                        variant="bare-inverse"
                        onclick={closeNewModal}
                    ></lightning-button-icon>
                    <h2 id="pod-member-new-heading" class="slds-modal__title slds-hyphenate">
                        New Pod Member
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form
                        object-api-name="Pod_Member__c"
                        onsuccess={handleCreateSuccess}
                    >
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Name" required></lightning-input-field>
                        <lightning-input-field field-name="Row_Type__c" required></lightning-input-field>
                        <lightning-input-field field-name="Sort_Order__c" required></lightning-input-field>
                        <lightning-input-field field-name="Icon_Style__c"></lightning-input-field>
                        <lightning-input-field field-name="Image_URL__c"></lightning-input-field>
                        <div class="slds-m-top_medium">
                            <lightning-button
                                class="slds-m-right_x-small"
                                type="submit"
                                variant="brand"
                                label="Save"
                            ></lightning-button>
                            <lightning-button
                                type="button"
                                variant="neutral"
                                label="Cancel"
                                onclick={closeNewModal}
                            ></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
